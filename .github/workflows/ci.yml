name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs previos del mismo ref si llega uno nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      - name: Test
        run: pnpm test

  # NOTA: `pnpm build` no corre en CI porque la generación estática de la landing
  # se conecta a Supabase en build-time. Agregar un job de build cuando estén los
  # secrets del repo (NEXT_PUBLIC_SUPABASE_URL, ..._PUBLISHABLE_KEY, etc.).
