version: 2
updates:
  - package-ecosystem: pnpm
    directory: /event/lodecharlytcg.com
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "12:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - dependabot